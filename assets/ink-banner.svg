<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="45%" r="75%"><stop offset="0" stop-color="#2b2926"/><stop offset=".5" stop-color="#111"/><stop offset="1" stop-color="#020304"/></radialGradient>
<linearGradient id="cream" x1="250" y1="90" x2="1370" y2="330" gradientUnits="userSpaceOnUse"><stop stop-color="#fff7e8"/><stop offset=".55" stop-color="#e8d5b8"/><stop offset="1" stop-color="#fff3df"/></linearGradient>
<linearGradient id="shine" x1="0" x2="1"><stop stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".95"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" seed="8"/><feColorMatrix values=".25 0 0 0 0 0 .25 0 0 0 0 0 .25 0 0 0 0 0 .25 0"/><feBlend in="SourceGraphic" mode="overlay"/></filter>
<filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fff0d4" flood-opacity=".35"/><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".8"/></filter>
<filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
<mask id="m"><rect width="1600" height="520" fill="black"/><text x="800" y="300" text-anchor="middle" class="title" font-size="230" fill="white">BinkaDev</text></mask>
<style>
.title{font-family:'Brush Script MT','Segoe Script','Lucida Handwriting',cursive;font-weight:900;letter-spacing:-8px}.sub{font-family:Georgia,serif;font-weight:800;letter-spacing:9px}.draw{stroke-dasharray:1800;stroke-dashoffset:1800;animation:draw 2.7s cubic-bezier(.16,1,.3,1) forwards}.fill{opacity:0;animation:fill .9s ease forwards 1.45s,pulse 4.5s ease-in-out infinite 2.6s}.subg{opacity:0;transform:translateY(14px);animation:up .9s ease forwards 2.1s}.line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:draw 1.35s ease forwards 2.15s}.sweep{animation:sweep 3.4s ease-in-out infinite 2.35s}.speed{stroke-dasharray:1200;stroke-dashoffset:1200;opacity:0;animation:speed 1.4s ease-out forwards .9s}.mist{animation:mist 9s ease-in-out infinite}.spark{opacity:0;animation:spark 3s ease-in-out infinite}@keyframes draw{to{stroke-dashoffset:0}}@keyframes fill{to{opacity:1}}@keyframes pulse{50%{opacity:.9}}@keyframes up{to{opacity:1;transform:translateY(0)}}@keyframes sweep{0%{transform:translateX(-520px) skewX(-18deg);opacity:0}20%{opacity:.85}55%{opacity:.2}100%{transform:translateX(1850px) skewX(-18deg);opacity:0}}@keyframes speed{20%{opacity:.9}to{opacity:.65;stroke-dashoffset:0}}@keyframes mist{50%{transform:translateX(35px);opacity:.26}}@keyframes spark{0%,100%{opacity:0;transform:scale(.6)}25%,45%{opacity:.9;transform:scale(1)}}
</style>
</defs>
<rect width="1600" height="520" fill="url(#bg)"/><rect width="1600" height="520" fill="#080808" filter="url(#grain)" opacity=".95"/>
<path d="M-90 412C150 310 315 230 535 180C760 128 965 82 1170 15C1325-36 1450-70 1700-120" stroke="#000" stroke-width="85" stroke-linecap="round" opacity=".58"/>
<path d="M-80 78C190 175 450 212 720 210C1010 208 1240 150 1660 25" stroke="#050505" stroke-width="92" stroke-linecap="round" opacity=".72"/>
<path d="M0 450C165 415 250 360 400 370C540 380 610 450 780 430C930 413 1000 340 1160 345C1310 350 1425 405 1600 385V520H0Z" fill="#d0c5b5" opacity=".11"/>
<ellipse class="mist" cx="260" cy="112" rx="330" ry="55" fill="#eee4d2" opacity=".16" filter="url(#blur)"/><ellipse class="mist" cx="1210" cy="132" rx="380" ry="65" fill="#eee4d2" opacity=".13" filter="url(#blur)"/>
<g stroke="#efe4d2" stroke-width="4" stroke-linecap="round" fill="none" opacity=".7"><path d="M1290 84C1304 72 1320 72 1332 84"/><path d="M1380 104C1390 94 1403 94 1414 104"/><path d="M1462 78C1470 71 1479 71 1488 78"/></g>
<path class="speed" d="M70 406C260 335 430 300 640 282C900 260 1090 218 1520 92" stroke="#fff3df" stroke-width="9" stroke-linecap="round"/>
<g fill="#fff3df"><circle class="spark" cx="405" cy="98" r="6"/><circle class="spark" style="animation-delay:.4s" cx="515" cy="126" r="4"/><circle class="spark" style="animation-delay:.8s" cx="1040" cy="102" r="5"/><circle class="spark" style="animation-delay:1.1s" cx="1260" cy="220" r="3"/></g>
<text x="800" y="300" text-anchor="middle" class="title draw" font-size="230" fill="none" stroke="url(#cream)" stroke-width="5" filter="url(#glow)">BinkaDev</text>
<text x="800" y="300" text-anchor="middle" class="title fill" font-size="230" fill="url(#cream)" filter="url(#glow)">BinkaDev</text>
<rect class="sweep" x="-540" y="45" width="380" height="300" fill="url(#shine)" mask="url(#m)"/>
<g class="subg"><text x="800" y="405" text-anchor="middle" class="sub" font-size="35" fill="#efe4d2">Tran Hoang Hai • Software Engineering D22</text><path class="line" d="M395 438C535 424 675 421 815 423C955 425 1080 432 1205 418" stroke="#efe4d2" stroke-width="7" stroke-linecap="round" opacity=".5"/></g>
</svg>