<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glassmorphism custom coding streak 200 days">
  <defs>
    <linearGradient id="pageBg" x1="40" y1="28" x2="860" y2="300" gradientUnits="userSpaceOnUse">
